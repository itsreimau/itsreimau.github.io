<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>itsreimau.is-a.dev</title>
        <meta name="description" content="Reimau von Lilitz - An enthusiast of Evangelion and programming." />
        <meta name="keywords" content="reimau von lilitz, muhamad ikbal maulana, itsreimau" />

        <link rel="icon" href="https://avatars.githubusercontent.com/u/90613431?v=4" />
        <link rel="canonical" href="https://itsreimau.is-a.dev/" />

        <link rel="stylesheet" href="assets/css/style.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" />

        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Person",
                "name": "Reimau von Lilitz",
                "alternateName": "Muhamad Ikbal Maulana",
                "url": "https://itsreimau.is-a.dev",
                "sameAs": [
                    "https://facebook.com/itsreimau",
                    "https://github.com/itsreimau",
                    "https://instagram.com/itsreimau",
                    "https://linkedin.com/in/itsreimau",
                    "https://mastodon.social/@itsreimau",
                    "https://x.com/itsreimau",
                    "https://threads.net/itsreimau",
                    "https://tiktok.com/@itsreimau",
                    "https://youtube.com/channel/UCJ0VtnpD9lBAi6D5ywA5klg"
                ],
                "knowsAbout": ["Muhamad Ikbal Maulana", "Reimau von Lilitz", "ItsReimau"],
                "description": "Reimau von Lilitz - An enthusiast of Evangelion and programming."
            }
        </script>
    </head>
    <body>
        <div class="container">
            <div class="profile">
                <div class="profile-pic-frame">
                    <img class="profile-pic" id="profileImg" alt="profile" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000000'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E☯%3C/text%3E%3C/svg%3E" />
                </div>
                <h1 class="name" id="displayName">Loading...</h1>
                <div class="bio" id="displayBio">Loading profile...</div>
            </div>

            <div class="links-grid" id="linksList"></div>

            <div class="footer">
                <span>◼ Made with DeepSeek by Reimau von Lilitz ◼</span>
            </div>
        </div>

        <div class="music-player" id="musicPlayerWidget">
            <button class="toggle-player" id="togglePlayerBtn"><i class="iconoir-arrow-down"></i></button>
            <div class="player-header">
                <img class="album-art-sm" id="playerAlbumArt" alt="album art" />
                <div class="song-meta">
                    <div class="song-title" id="playerSongTitle">Loading...</div>
                    <div class="artist-name" id="playerArtist">Loading...</div>
                </div>
            </div>
            <div class="lyrics-box" id="lyricsBox">
                <div id="activeLyricLine">Loading lyrics...</div>
            </div>
            <div class="controls">
                <button class="play-pause-btn" id="playPauseBtnMusic">
                    <i class="iconoir-play" id="playIcon"></i>
                </button>
                <div class="progress-area">
                    <div class="progress-bg" id="progressBg">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-stamp">
                        <span id="currentTimeLabel">0:00</span>
                        <span id="durationLabel">0:00</span>
                    </div>
                </div>
            </div>
            <audio id="audioElem" preload="metadata"></audio>
        </div>

        <div id="welcomeOverlay" class="welcome-modal">
            <div class="welcome-card">
                <i class="iconoir-heart"></i>
                <h2>WELCOME!</h2>
                <p>YOU ACKNOWLEDGE THE POSSIBILITY OF PAIN AND SEIZURE.</p>
                <button id="closeWelcomeBtn">YES</button>
            </div>
        </div>

        <script src="assets/js/script.js"></script>
    </body>
</html>
